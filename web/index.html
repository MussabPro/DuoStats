<!doctype html>
<html lang="en-US">
  <head>
    <!-- Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eccc68" />
    <meta name="msapplication-navbutton-color" content="#eccc68" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#eccc68" />
    <meta
      name="description"
      content="Duolingo's Japanese language learning visualizer"
    />

    <style>
      :root {
        color-scheme: light;
        --page-bg: #f6f6f6;
        --card-bg: #ffffff;
        --text-primary: #3c3c3c;
        --text-secondary: #777777;
        --border: #e5e5e5;
        --accent: #ff4b00;
        --xp: #78c800;
        --graph-line: #1db0f6;
        --bar-empty: #e5e5e5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --page-bg: #121212;
          --card-bg: #1f1f1f;
          --text-primary: #ffffff;
          --text-secondary: #aaaaaa;
          --border: #3a3a3a;
          --bar-empty: #3a3a3a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 48px 16px;
        font-family: "DIN Round Pro", system-ui, sans-serif;
        background: var(--page-bg);
        color: var(--text-primary);
      }

      .container {
        max-width: 540px;
        margin: 0 auto;
      }
      .pills {
        display: flex;
        gap: 12px;
      }
      @media (max-width: 520px) {
        .pills {
          flex-direction: column;
        }
        .pill {
          display: flex;
          align-items: center;
          justify-content: center;
        }
      }

      .duo-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
      }

      .banner-label {
        color: var(--text-secondary);
      }

      .card-username {
        margin: 12px 0 16px;
        font-size: 20px;
        font-weight: 700;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 10px;
        display: flex;
        gap: 6px;
        align-items: center;
        font-size: 12px;
        color: var(--text-primary);
        width: 100%;
      }

      .pill-icon {
        width: 16px;
        height: 16px;
      }

      .pill-flags {
        display: flex;
        gap: 4px;
        margin-top: 2px;
      }

      .pill-flag {
        width: 16px;
        height: 12px;
      }

      .pill-label {
        color: var(--text-secondary);
        font-size: 11px;
      }

      .pill-value {
        font-weight: 700;
      }

      .pill-value.xp {
        color: var(--xp);
      }

      .pill-value.streak {
        color: var(--accent);
      }

      .globe-text {
        font-size: 6px;
        fill: var(--text-secondary);
        font-family: "DIN Round Pro", system-ui, sans-serif;
      }

      .chart-section {
        margin-top: 6px;
      }

      .chart-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .chart-wrapper {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 20px;
      }

      .chart-svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .chart-legend {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        font-size: 11px;
        color: var(--text-secondary);
      }

      .legend-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--graph-line);
      }

      .languages-section {
        border-top: 1px solid var(--border);
        padding-top: 14px;
        margin-top: 16px;
      }

      .languages-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 10px;
      }
      .title {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 16px;
      }

      .languages-list {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .language-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 10px;
        min-width: 90px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }

      .language-flag {
        width: 28px;
        height: 20px;
      }

      .language-name {
        font-weight: 600;
        font-size: 12px;
        text-align: center;
      }

      .language-xp {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .card-footer {
        margin-top: 16px;
        font-size: 10px;
        color: var(--text-secondary);
        text-align: center;
      }

      .dashboard {
        margin-top: 24px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }

      .dashboard-header {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .filter-group {
        display: flex;
        flex-direction: column;

        gap: 6px;
        font-size: 12px;
      }

      .filter-group label {
        color: var(--text-secondary);
      }

      .filter-group input,
      .filter-group select,
      .filter-group button {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-primary);
        font-family: inherit;
      }

      .filter-actions {
        display: flex;

        align-items: flex-end;
        gap: 8px;
      }

      .filter-actions button {
        cursor: pointer;
        background-color: var(--xp);
        border: 1px solid var(--border);
        color: #fff;
        font-weight: 600;
        transition: background-color 0.2s;
        border-radius: 10px;
        padding: 8px 12px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .summary-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        font-size: 12px;
      }

      .summary-value {
        font-size: 18px;
        font-weight: 700;
        margin-top: 6px;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th,
      td {
        padding: 8px 6px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      th {
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      @media (max-width: 520px) {
        body {
          padding: 32px 12px;
        }

        .stats-row {
          grid-template-columns: 1fr 1fr;
        }

        .filters,
        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Title -->
    <title>DuoStats</title>
  </head>

  <body>
    <main class="container">
      <h1 class="title">DuoStats</h1>
      <section class="profile">
        <div class="pills">
          <div class="pill">
            <img class="pill-icon" src="Images/Streak.svg" alt="Streak" />
            <div>
              <div class="pill-label">Streak</div>
              <div class="pill-value streak" id="profile-streak">0 days</div>
            </div>
          </div>
          <div class="pill">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <path d="M13 2 4 13h6l-1 9 9-11h-6l1-9z" fill="var(--xp)" />
            </svg>
            <div>
              <div class="pill-label">Total XP</div>
              <div class="pill-value xp" id="profile-xp">0</div>
            </div>
          </div>
          <div class="pill">
            <img class="pill-icon" src="Images/Languages.svg" alt="Languages" />
            <div>
              <div class="pill-label">Languages</div>
              <div class="pill-flags" id="profile-language-flags"></div>
            </div>
          </div>
        </div>

        <div class="chart-section">
          <div class="chart-title">Last 7 days</div>
          <div class="chart-wrapper">
            <svg
              class="chart-svg"
              viewBox="0 0 360 180"
              role="img"
              aria-label="Weekly XP trend"
            >
              <g stroke="var(--bar-empty)" stroke-width="1">
                <line x1="40" y1="140" x2="340" y2="140" />
                <line x1="40" y1="100" x2="340" y2="100" />
                <line x1="40" y1="60" x2="340" y2="60" />
                <line x1="40" y1="20" x2="340" y2="20" />
              </g>
              <g fill="var(--text-secondary)" font-size="10">
                <text x="10" y="144">0</text>
                <text x="6" y="104">300</text>
                <text x="6" y="64">600</text>
                <text x="6" y="24">900</text>
              </g>
              <polyline
                id="weekly-line"
                fill="none"
                stroke="var(--graph-line)"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></polyline>
              <g id="weekly-dots" fill="var(--graph-line)"></g>
              <g
                id="weekly-labels"
                fill="var(--text-secondary)"
                font-size="10"
              ></g>
            </svg>
            <div class="chart-legend">
              <div class="legend-left">
                <span class="legend-dot"></span>
                <span id="legend-username">username</span>
              </div>
              <div id="legend-total">0 XP</div>
            </div>
          </div>
        </div>

        <div class="languages-section">
          <div class="languages-title">Languages</div>
          <div class="languages-list" id="languages-list"></div>
        </div>
      </section>

      <section class="dashboard">
        <div class="dashboard-header">Stats Explorer</div>
        <div class="filters">
          <div class="filter-group">
            <label for="filter-start">Start date</label>
            <input type="date" id="filter-start" />
          </div>
          <div class="filter-group">
            <label for="filter-end">End date</label>
            <input type="date" id="filter-end" />
          </div>
          <div class="filter-group" style="display: none">
            <label for="filter-language">Language</label>
            <select id="filter-language">
              <option value="">All languages</option>
            </select>
          </div>
          <div class="filter-actions">
            <button id="filter-apply">Apply</button>
            <button id="filter-reset">Reset</button>
          </div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <div>Total XP</div>
            <div class="summary-value" id="summary-xp">0</div>
          </div>
          <div class="summary-card">
            <div>Sessions</div>
            <div class="summary-value" id="summary-lessons">0</div>
          </div>
          <div class="summary-card">
            <div>Time Spent</div>
            <div class="summary-value" id="summary-time">0 min</div>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Sessions</th>
                <th>XP</th>
                <th>Time (min)</th>
              </tr>
            </thead>
            <tbody id="stats-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
